<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Motor IDPS — Agencia de Calidad · establecimientos de Chile</title>
<style>
__FONTS_CSS__
  :root{
    --azul:#0A3A5C; --cream:#FFF6E0; --tinta:#23303a; --gris:#6b7780;
    --linea:#e4dcc6; --panel:#fffdf7; --foco:#0062A0;
    --ind1:#EE2D49; --ind2:#FFC92E; --ind3:#9BC93E; --ind4:#2A8FD9;
    --bajo:#E88663; --medio:#FFC92E; --alto:#75924E;
    --alerta:#c0392b; --alerta-bg:#fbe9e7; --destaca:#3a8f4a; --destaca-bg:#eaf5ec;
    --sombra:0 2px 8px rgba(74,39,70,.10);
    /* Tokens que consume EntityModal (mapeados a la identidad del motor) */
    --border-2:var(--linea); --radius-2:8px; --ink:var(--tinta); --fs-base:14px;
    --font-body:"Museo Sans","Helvetica Neue",system-ui,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--tinta);
    font-family:"Museo Sans","Helvetica Neue",system-ui,Arial,sans-serif;font-size:14px;line-height:1.45;}
  h1,h2,h3,.gob{font-family:"gobCL","Museo Sans",system-ui,sans-serif;}
  header.app{background:var(--azul);color:#fff;padding:14px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
  header.app h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.4px;}
  header.app .sub{font-size:12px;opacity:.85;max-width:760px;}
  .wrap{max-width:1320px;margin:0 auto;padding:16px 24px 70px;}

  .nav{background:var(--panel);border:1px solid var(--linea);border-radius:10px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--sombra);}
  .nav-row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
  .ctl label{display:block;font-size:10.5px;letter-spacing:.5px;color:var(--gris);margin-bottom:5px;}
  select{padding:7px 9px;border:1px solid var(--linea);border-radius:7px;background:#fff;font-size:13px;min-width:150px;font-family:inherit;}
  .seg{display:inline-flex;border:1px solid var(--linea);border-radius:7px;overflow:hidden;}
  .seg button{border:0;background:#fff;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--tinta);border-right:1px solid var(--linea);font-family:inherit;}
  .seg button:last-child{border-right:0;}
  .seg button.on{background:var(--azul);color:#fff;font-weight:600;}
  .gse-pills{display:inline-flex;gap:5px;flex-wrap:wrap;}
  .gse-pills button{border:1px solid var(--linea);background:#fff;border-radius:15px;padding:4px 11px;cursor:pointer;font-size:12px;font-family:inherit;}
  .gse-pills button.on{background:var(--foco);color:#fff;border-color:var(--foco);}
  .crumb{font-size:12.5px;color:var(--gris);margin:2px 0 10px;}
  .crumb b{color:var(--azul);}

  .help{background:#eef3f7;border:1px solid #d4e2ec;border-radius:8px;padding:10px 13px;font-size:12.5px;color:#3d5566;margin-bottom:14px;}
  .help b{color:var(--azul);}

  .gse-group{margin-bottom:24px;}
  .gse-head{display:flex;align-items:center;gap:10px;margin:6px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--linea);}
  .gse-head .tag{background:var(--azul);color:#fff;border-radius:6px;padding:3px 11px;font-size:12px;font-weight:600;}
  .gse-head .cnt{font-size:12px;color:var(--gris);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:14px;}
  .card{background:var(--panel);border:1px solid var(--linea);border-radius:9px;padding:11px;cursor:pointer;transition:box-shadow .12s,transform .12s;}
  .card:hover{box-shadow:var(--sombra);transform:translateY(-1px);}
  .card.foco{border-color:var(--foco);box-shadow:0 0 0 1px var(--foco) inset;}
  .card .nom{font-size:12px;font-weight:700;line-height:1.25;height:2.5em;overflow:hidden;}
  .card .meta{font-size:10.5px;color:var(--gris);margin-top:2px;}
  .alerts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;min-height:20px;}
  .chip{font-size:10.5px;padding:2px 7px;border-radius:11px;font-weight:600;display:inline-flex;gap:3px;align-items:center;}
  .chip.al{background:var(--alerta-bg);color:var(--alerta);}
  .chip.de{background:var(--destaca-bg);color:var(--destaca);}
  .chip.nt{background:#eee5cf;color:#6a5a2f;}
  .badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;background:#eee5cf;color:#6a5a2f;margin-top:5px;}
  .badge.foco{background:var(--foco);color:#fff;}
  .empty{padding:46px;text-align:center;color:var(--gris);}
  .sup{color:#b06a4f;font-style:italic;}
  .leyenda{display:flex;gap:14px;font-size:11px;color:var(--gris);margin:4px 0 12px;flex-wrap:wrap;align-items:center;}
  .leyenda i{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:-1px;}
  /* II.6 — control de comparacion de dos anios en el radar */
  .radar-cmp{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:8px;}
  .radar-cmp .leyenda{margin:0;justify-content:center;}
  .radar-cmp .cmp-label{font-size:11.5px;color:var(--gris);}
  .radar-cmp select{padding:3px 7px;font-size:12px;min-width:auto;border:1px solid var(--linea);border-radius:6px;background:#fff;font-family:inherit;}

  .detail{background:var(--panel);border:1px solid var(--linea);border-radius:10px;padding:20px;box-shadow:var(--sombra);}
  .back{border:0;background:none;color:var(--foco);cursor:pointer;font-size:13px;padding:0;font-family:inherit;}
  .detail h2{margin:.15em 0;font-size:20px;}
  .dmeta{font-size:12.5px;color:var(--gris);margin-bottom:8px;}
  .dcrumb{font-size:13px;margin:10px 0 14px;}
  .dcrumb button{border:0;background:none;color:var(--foco);cursor:pointer;font-size:13px;padding:0;font-family:inherit;}
  .dcrumb span{color:var(--gris);}
  .dcrumb b{color:var(--tinta);}
  .row2{display:grid;grid-template-columns:340px 1fr;gap:26px;}
  @media(max-width:860px){.row2{grid-template-columns:1fr;}}
  .blk h3{font-size:13px;letter-spacing:.4px;color:var(--azul);margin:0 0 10px;border-bottom:1px solid var(--linea);padding-bottom:5px;}

  /* GSE protagonista: fila de indicador/dimension con doble ancla */
  .anchor-row{padding:9px 0;border-bottom:1px solid var(--linea);cursor:pointer;}
  .anchor-row:hover{background:#fbf7ea;}
  .anchor-row.flat{cursor:default;}
  .anchor-row.flat:hover{background:none;}
  .ar-top{display:flex;align-items:center;gap:9px;}
  .ar-sw{width:12px;height:12px;border-radius:3px;flex:none;}
  .ar-nom{font-weight:600;font-size:13px;}
  .ar-prom{margin-left:auto;font-weight:800;font-size:17px;}
  .ar-prom .u{font-size:10px;color:var(--gris);font-weight:400;}
  .anclas{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .ancla{font-size:11px;padding:3px 9px;border-radius:7px;border:1px solid var(--linea);background:#fff;display:flex;gap:5px;align-items:center;}
  .ancla .k{color:var(--gris);font-size:9.5px;letter-spacing:.3px;}
  .ancla.al{background:var(--alerta-bg);border-color:#f3c9c2;color:var(--alerta);}
  .ancla.de{background:var(--destaca-bg);border-color:#c5e4cd;color:var(--destaca);}
  .arr{font-weight:800;}
  .go{margin-left:6px;color:var(--foco);font-size:11px;}

  .distrow{margin:11px 0;}
  .distrow .lbl{font-size:12.5px;font-weight:600;}
  .distrow .actores{font-size:10px;color:var(--gris);font-weight:400;}
  .bar{display:flex;height:19px;border-radius:5px;overflow:hidden;border:1px solid var(--linea);background:#f4f1e8;}
  .bar span{display:flex;align-items:center;justify-content:center;font-size:10px;color:#2e2710;font-weight:600;}
  .nivel-txt{font-size:11px;color:#5a5142;margin-top:3px;}
  .defn{font-size:11px;color:#6a6253;font-style:italic;margin:2px 0 6px;}
  /* P-meta: definicion metodologica contextual (colapsable, discreta) */
  .defn-box{margin-top:6px;}
  .defn-toggle{border:0;background:none;color:var(--foco);cursor:pointer;font-size:11px;padding:0;font-family:inherit;display:inline-flex;align-items:center;gap:3px;}
  .defn-toggle:hover{text-decoration:underline;}
  .defn-text{font-size:11.5px;color:#5a5142;line-height:1.45;margin-top:5px;max-width:70ch;}
  .defn-ctx{background:#f4f1e8;border-radius:7px;padding:9px 12px;margin:0 0 14px;}
  .defn-ctx .defn-text{color:#4a4536;}
  .nota{font-size:11px;color:var(--gris);background:#f4f1e8;border-radius:6px;padding:9px 11px;margin-top:10px;}
  /* Evolucion: small-multiples 2x2 (un panel por indicador/dimension) */
  .evol-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:680px){.evol-grid{grid-template-columns:1fr;}}
  .evol-panel{border:1px solid var(--linea);border-radius:8px;padding:10px 12px;background:#fff;}
  .evol-h{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:2px;}
  .evol-sw{width:11px;height:11px;border-radius:3px;flex:none;}
  .evol-marks{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .evol-mark{font-size:11px;padding:2px 8px;border-radius:11px;background:#eee5cf;color:#6a5a2f;display:inline-flex;gap:4px;align-items:center;}
  .evol-mark.al{background:var(--alerta-bg);color:var(--alerta);}
  .evol-mark.de{background:var(--destaca-bg);color:var(--destaca);}
  .evol-mark.nt{background:#eef0ee;color:var(--gris);}
  .evol-mark .arr{font-weight:800;}
  .evol-sig{font-size:9.5px;opacity:.8;}
  /* --- Disparador de navegacion + chips de seleccion (reemplaza los selects) --- */
  .nav-trigger{appearance:none;border:1px solid var(--foco);background:#fff;color:var(--foco);
    padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .nav-trigger:hover{background:#eef3f7;}
  .nav-sel{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px;}
  .sel-chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--linea);
    border-radius:14px;padding:3px 10px;font-size:12px;}
  .sel-chip .k{color:var(--gris);font-size:10px;text-transform:none;}
  .sel-chip button{border:0;background:none;color:var(--gris);cursor:pointer;font-size:12px;padding:0 0 0 2px;}
  .sel-chip button:hover{color:var(--alerta);}
  .sel-link{border:0;background:none;color:var(--foco);cursor:pointer;font-size:12px;font-family:inherit;text-decoration:underline;}
  /* --- EntityModal (selector portable, andamio; tokens del motor) --- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,58,92,.42);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
  .modal{background:#fff;border-radius:var(--radius-2);width:100%;max-width:460px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 14px 44px rgba(10,58,92,.30);overflow:hidden;}
  .modal-header{padding:16px 18px 8px;}
  .modal-title{margin:0;font-family:"gobCL",var(--font-body);font-size:16px;font-weight:800;color:var(--azul);}
  .modal-tabs{display:flex;gap:4px;padding:0 18px;border-bottom:1px solid var(--border-2);flex-wrap:wrap;}
  .modal-tab{appearance:none;background:none;border:none;padding:8px 12px;font-family:var(--font-body);font-size:var(--fs-base);color:var(--gris);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .modal-tab.is-active{color:var(--foco);font-weight:700;border-bottom-color:var(--foco);}
  .modal-body{padding:14px 18px;overflow-y:auto;}
  .comuna-checklist{display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
  .check-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-2);cursor:pointer;}
  .check-row:hover{background:#f3f0e8;}
  .check-name{flex:1 1 auto;font-family:var(--font-body);font-size:var(--fs-base);color:var(--ink);}
  .check-region{flex:0 0 auto;font-size:11px;color:var(--gris);}
  .empty-state{padding:24px 10px;text-align:center;color:var(--gris);font-size:var(--fs-base);}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--border-2);}
  .estab-popup-btn{appearance:none;border:1px solid var(--border-2);background:#fff;padding:8px 14px;border-radius:var(--radius-2);font-family:var(--font-body);font-size:var(--fs-base);cursor:pointer;color:var(--ink);}
  .estab-popup-btn:hover{background:#f3f0e8;}
  .axis-lab{font-size:9px;fill:var(--gris);} .axis-lab.b{font-size:10px;}
  .ring{fill:none;stroke:var(--linea);}
  .tt{position:fixed;background:#23303a;color:#fff;font-size:11px;padding:5px 8px;border-radius:5px;pointer-events:none;display:none;z-index:80;max-width:260px;}
  code{background:#eee5cf;padding:0 4px;border-radius:3px;font-size:11px;}
</style>
</head>
<body>
  <header class="app">
    <h1>Motor IDPS</h1>
    <span class="sub">Indicadores de Desarrollo Personal y Social — Agencia de Calidad de la Educación · dato por establecimiento educacional de todo Chile, leído vs su grupo socioeconómico (GSE). Sin agregación territorial.</span>
  </header>
  <div id="root"></div>
  <div class="tt" id="tt"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
          integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
          integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
  <script>__D3_INLINE__</script>
  <script>__PAKO_INLINE__</script>
  <script>
    window.__t0 = performance.now();
    const DATA = JSON.parse(pako.inflate(
      Uint8Array.from(atob("__JSON_DATA__"), c => c.charCodeAt(0)), { to: "string" }));
    window.__tDecode = performance.now() - window.__t0;
  </script>

  <script type="text/babel" data-presets="env,react">
  "use strict";
  const {useState, useMemo, useRef, useEffect} = React;

  // ===== Indice de rangos por rbd (columnas ORDENADAS por rbd; sin materializar
  //       1,5M de objetos: solo [inicio,fin) por establecimiento) =====
  const tIdx0 = performance.now();
  function rangeIdx(arr){const m=Object.create(null);for(let i=0;i<arr.length;i++){const r=arr[i];const e=m[r];if(e===undefined)m[r]=[i,i+1];else e[1]=i+1;}return m;}
  const RIX={ind:rangeIdx(DATA.ind.rbd), dim:rangeIdx(DATA.dim.rbd), niv:rangeIdx(DATA.niv.rbd), roster:rangeIdx(DATA.roster.rbd)};
  window.__tIndex = performance.now() - tIdx0;

  const indById={}; DATA.indicadores.forEach(d=>indById[d.id]=d);
  const dimById={}; DATA.dimensiones.forEach(d=>dimById[d.id]=d);
  const subById={}; DATA.subdimensiones.forEach(d=>{if(d.id!=null)subById[d.id]=d;});
  const subByDim={}; DATA.subdimensiones.forEach(d=>{if(d.tiene_niveles){(subByDim[d.id_dim]=subByDim[d.id_dim]||[]).push(d);}});
  const dimsByInd={}; DATA.dimensiones.forEach(d=>{(dimsByInd[d.id_ind]=dimsByInd[d.id_ind]||[]).push(d);});
  const est={}; DATA.establecimientos.forEach(e=>est[e.rbd]=e);
  const GSE=DATA.meta.gse_labels, DEPE=DATA.meta.depe2_labels;
  const FOCO=new Set(DATA.meta.comunas_foco);
  // Foco de apertura: SLEP Costa Central (cod del SLEP en el dato; sus
  // establecimientos tienen cod_slep === SLEP_FOCO). Es el ESTADO inicial de
  // navegacion, no un filtro fijo: el usuario lo cambia con EntityModal.
  const SLEP_FOCO=DATA.meta.slep_foco||null;
  const SLEP_FOCO_NOM=(DATA.sleps.find(s=>String(s.cod_slep)===String(SLEP_FOCO))||{}).nombre_slep||"Costa Central";
  const FOCO_INICIAL=SLEP_FOCO!=null?{kind:"foco"}:{kind:"region",cod:DATA.meta.region_foco||DATA.regiones[0].cod};
  const CICLO={"4b":"basica","6b":"basica","2m":"media"};      // 8b -> sin texto
  const PRELIM=new Set((DATA.meta.anios_preliminar||[]).map(String));  // anios preliminares (del dato)
  const fmt=v=>(v==null||isNaN(v))?"—":Number(v).toLocaleString("es-CL",{maximumFractionDigits:1});
  const fmtSigned=v=>v==null?"—":(v>0?"+":"")+Number(v).toLocaleString("es-CL",{maximumFractionDigits:1});
  // Title Case en capa de presentacion para nombres ALLCAPS del dato (comuna, EE),
  // conservando siglas y bajando conectores. NO altera el parquet. JS toLowerCase/
  // toUpperCase son Unicode-aware (Ñ/tildes correctas) sin depender del locale.
  const SIGLAS=new Set(["SLEP","GSE","RBD","IDPS","EST","DOC","PAD","SIMCE"]);
  const CONECT=new Set(["de","la","del","los","las","y","e","en","a","o","da","do"]);
  const tc=s=>{ if(!s) return s;
    return String(s).split(/\s+/).map((w,i)=>{
      const wu=w.toUpperCase(); if(SIGLAS.has(wu)) return wu;
      const wl=w.toLowerCase(); if(i>0 && CONECT.has(wl)) return wl;
      return wl.charAt(0).toUpperCase()+wl.slice(1);
    }).join(" ");
  };

  // lectura de medidas para (rbd, grado, agno)
  function indOf(rbd,grado,agno){const b=DATA.ind,r=RIX.ind[rbd],o={};if(!r)return o;for(let i=r[0];i<r[1];i++)if(b.grado[i]===grado&&b.agno[i]===agno)o[b.ind[i]]={prom:b.prom[i],dif:b.dif[i],sigdif:b.sigdif[i],difgru:b.difgru[i],sigdifgru:b.sigdifgru[i]};return o;}
  function dimOf(rbd,grado,agno){const b=DATA.dim,r=RIX.dim[rbd],o={};if(!r)return o;for(let i=r[0];i<r[1];i++)if(b.grado[i]===grado&&b.agno[i]===agno)o[b.dim[i]]={prom:b.prom[i],dif:b.dif[i],sigdif:b.sigdif[i]};return o;}
  function nivOf(rbd,grado,agno){const b=DATA.niv,r=RIX.niv[rbd],o={};if(!r)return o;for(let i=r[0];i<r[1];i++)if(b.grado[i]===grado&&b.agno[i]===agno)o[b.sub[i]]={bajo:b.bajo[i],medio:b.medio[i],alto:b.alto[i]};return o;}
  // serie de un indicador/dimension a lo largo de los anios
  function serieInd(rbd,grado,indId,anios){return anios.map(a=>{const d=indOf(rbd,grado,a)[indId];return{a,v:d?d.prom:null};});}
  function serieDim(rbd,grado,dimId,anios){return anios.map(a=>{const d=dimOf(rbd,grado,a)[dimId];return{a,v:d?d.prom:null};});}

  const tt=()=>document.getElementById("tt");
  const showTT=(h,e)=>{const t=tt();t.innerHTML=h;t.style.display="block";t.style.left=(e.clientX+12)+"px";t.style.top=(e.clientY+12)+"px";};
  const hideTT=()=>{tt().style.display="none";};

  // ===== Definicion metodologica contextual (colapsable; del catalogo embebido) =====
  // Degrada con elegancia: sin texto -> no renderiza bloque (no "undefined"/vacio).
  function Definicion({texto, etiqueta, contexto}){
    const [open,setOpen]=useState(false);
    if(!texto) return null;
    return (
      <div className={contexto?"defn-box defn-ctx":"defn-box"}>
        <button className="defn-toggle" onClick={(e)=>{e.stopPropagation();setOpen(o=>!o);}}>
          {open?"▾":"ⓘ"} {etiqueta||"¿Qué mide?"}</button>
        {open && <div className="defn-text">{texto}</div>}
      </div>);
  }

  // ===== Radar D3 (rompe en NA: honesto con la supresion) =====
  // axes  = serie principal [{label,value,color}]
  // axesB = serie de comparacion opcional (mismo orden de ejes; II.6 dos anios)
  // showLabels = nombre corto del eje; showValues = puntaje (prom) en el vertice
  // colB/labelB = color y tooltip de la serie de comparacion.
  function Radar({axes,axesB,size,showLabels,showValues,colB,labelB}){
    const ref=useRef(null);
    useEffect(()=>{const el=ref.current;el.innerHTML="";
      const small=size<210, COLB=colB||"#C77D3A";
      const margen=(showLabels||showValues)?(small?28:42):12;
      const R=size/2,cx=R,cy=R,rad=R-margen,n=axes.length;
      // overflow visible: las etiquetas laterales (Convivencia/Habitos) pueden
      // exceder el cuadro del svg sin recortarse (hay holgura en la columna).
      const svg=d3.select(el).append("svg").attr("width",size).attr("height",size).style("overflow","visible");
      const ang=i=>(Math.PI*2*i/n)-Math.PI/2, rsc=d3.scaleLinear().domain([0,100]).range([0,rad]);
      [20,40,60,80,100].forEach(t=>svg.append("circle").attr("cx",cx).attr("cy",cy).attr("r",rsc(t)).attr("class","ring"));
      axes.forEach((a,i)=>{const x=cx+Math.cos(ang(i))*rad,y=cy+Math.sin(ang(i))*rad;
        svg.append("line").attr("x1",cx).attr("y1",cy).attr("x2",x).attr("y2",y).attr("stroke","var(--linea)");
        if(showLabels||showValues){
          const lx=cx+Math.cos(ang(i))*(rad+(small?9:13)),ly=cy+Math.sin(ang(i))*(rad+(small?9:13));
          const anchor=Math.abs(Math.cos(ang(i)))<.3?"middle":(Math.cos(ang(i))>0?"start":"end");
          const t=svg.append("text").attr("x",lx).attr("y",ly).attr("class","axis-lab b")
            .attr("text-anchor",anchor).attr("dominant-baseline","middle");
          if(showLabels) t.append("tspan").attr("x",lx).attr("fill",a.color||"var(--gris)")
            .attr("font-weight",600).attr("font-size",small?"8px":"10.5px").text(a.label);
          if(showValues) t.append("tspan").attr("x",lx).attr("dy",showLabels?(small?"0.95em":"1.1em"):0)
            .attr("font-weight",800).attr("font-size",small?"9.5px":"12px").attr("fill","var(--tinta)")
            .text(a.value==null?"—":fmt(a.value));
        }});
      const mkpts=ax=>ax.map((a,i)=>({a,x:cx+Math.cos(ang(i))*rsc(a.value||0),y:cy+Math.sin(ang(i))*rsc(a.value||0)}));
      const lineGen=d3.line().defined(d=>d.a.value!=null).x(d=>d.x).y(d=>d.y).curve(d3.curveLinearClosed);
      // Serie de comparacion (debajo): linea discontinua de otro color.
      if(axesB){const ptsB=mkpts(axesB);
        svg.append("path").datum(ptsB).attr("d",lineGen).attr("fill","none").attr("stroke",COLB)
          .attr("stroke-width",1.7).attr("stroke-dasharray","4 3").attr("opacity",.95);
        ptsB.forEach(p=>{if(p.a.value==null)return;svg.append("circle").attr("cx",p.x).attr("cy",p.y).attr("r",small?2.3:3).attr("fill",COLB)
          .on("mousemove",e=>showTT("<b>"+p.a.label+"</b>"+(labelB?" · "+labelB:"")+"<br>"+fmt(p.a.value)+" pts (0–100)",e)).on("mouseleave",hideTT);});}
      const pts=mkpts(axes);
      svg.append("path").datum(pts).attr("d",lineGen).attr("fill","rgba(10,58,92,.10)").attr("stroke","var(--azul)").attr("stroke-width",1.8);
      pts.forEach(p=>{if(p.a.value==null)return;svg.append("circle").attr("cx",p.x).attr("cy",p.y).attr("r",(showLabels||showValues)?4:2.6).attr("fill",p.a.color||"var(--azul)")
        .on("mousemove",e=>showTT("<b>"+p.a.label+"</b><br>"+fmt(p.a.value)+" pts (0–100)",e)).on("mouseleave",hideTT);});
    },[axes,axesB,size,showLabels,showValues,colB,labelB]);
    return <div ref={ref}></div>;
  }

  // ===== Ancla (vs GSE / vs año anterior): numero + significancia + color =====
  function Ancla({tipo,dif,sig}){
    if(dif==null) return <div className="ancla"><span className="k">{tipo}</span><span className="sup">sin dato</span></div>;
    const significativo = sig!=null && sig!==0;
    let cls="", arr="=";
    if(dif>0){arr="▲"; cls=significativo?"de":"";}
    else if(dif<0){arr="▼"; cls=significativo?"al":"";}
    const lbl = significativo ? "significativo" : "no significativo";
    return <div className={"ancla "+cls} title={tipo+": "+fmtSigned(dif)+" · "+lbl}>
      <span className="k">{tipo}</span><span className="arr">{arr}</span>{fmtSigned(dif)}
      <span style={{fontSize:"9px",opacity:.8}}>{significativo?"· sig.":"· n.s."}</span></div>;
  }

  // ===== Fila de indicador/dimension con doble ancla (GSE protagonista) =====
  function AnchorRow({color,nombre,d,definicion,onClick}){
    return (
      <div className={"anchor-row"+(onClick?"":" flat")} onClick={onClick}>
        <div className="ar-top">
          <span className="ar-sw" style={{background:color}}></span>
          <span className="ar-nom">{nombre}</span>
          {onClick && <span className="go">ver ›</span>}
          <span className="ar-prom">{d&&d.prom!=null?fmt(d.prom):<span className="sup" style={{fontSize:13}}>sin dato</span>}{d&&d.prom!=null&&<span className="u"> /100</span>}</span>
        </div>
        {d&&d.prom!=null &&
          <div className="anclas">
            <Ancla tipo="vs su GSE" dif={d.difgru} sig={d.sigdifgru}/>
            <Ancla tipo="vs año anterior" dif={d.dif} sig={d.sigdif}/>
          </div>}
        <Definicion texto={definicion}/>
      </div>);
  }

  // ===== Resumen de alertas de un establecimiento (para la tarjeta) =====
  function alertSummary(im){
    let bajo=0,sobre=0,dato=0;
    DATA.indicadores.forEach(ind=>{const d=im[ind.id];if(d&&d.prom!=null){dato++;if(d.sigdifgru===-1)bajo++;else if(d.sigdifgru===1)sobre++;}});
    return {bajo,sobre,dato};
  }

  // ===== Tarjeta de establecimiento =====
  function Card({rbd,grado,agno,onSel}){
    const e=est[rbd]; const im=indOf(rbd,grado,agno);
    const axes=DATA.indicadores.map(ind=>({label:ind.corto,value:im[ind.id]?im[ind.id].prom:null,color:ind.color}));
    const foco=FOCO.has(e?.cod_com); const al=alertSummary(im);
    return (
      <div className={"card"+(foco?" foco":"")} onClick={()=>onSel(rbd)}>
        <div className="nom">{e&&e.nom?tc(e.nom):rbd}</div>
        <div className="meta">{est[rbd]?comNom(est[rbd].cod_com):""} · {DEPE[e?.cod_depe2]||"—"}</div>
        <Radar axes={axes} size={168} showLabels={false} showValues={true}/>
        <div className="alerts">
          {al.bajo>0 && <span className="chip al" title="indicadores significativamente bajo su GSE">▼ {al.bajo} bajo GSE</span>}
          {al.sobre>0 && <span className="chip de" title="indicadores significativamente sobre su GSE">▲ {al.sobre} sobre GSE</span>}
          {al.dato>0 && al.bajo===0 && al.sobre===0 && <span className="chip nt">≈ en su GSE</span>}
          {al.dato===0 && <span className="chip nt sup">sin dato</span>}
        </div>
        {foco && <span className="badge foco">Costa Central</span>}
      </div>);
  }

  const comNom=cod=>{const c=DATA.comunas.find(x=>x.cod===cod);return c?tc(c.nom):cod;};
  const regNom=cod=>{const r=DATA.regiones.find(x=>x.cod===cod);return r?r.nom:cod;};

  // ===== Distribucion de niveles de una subdimension =====
  function DistBar({v}){
    const segs=[["bajo","var(--bajo)"],["medio","var(--medio)"],["alto","var(--alto)"]];
    return <div className="bar">{segs.map(([k,c])=>{const val=v[k];if(val==null||val===0)return null;
      return <span key={k} style={{width:val+"%",background:c}} title={k+": "+fmt(val)+"%"}>{val>=9?fmt(val):""}</span>;})}</div>;
  }

  // serie completa de una metrica (indicador o dimension) por anio: prom + dif +
  // sigdif (vs evaluacion anterior, LEIDOS de la Agencia, no calculados).
  function serieFull(ofFn,rbd,grado,id,anios){return anios.map(a=>{const d=ofFn(rbd,grado,a)[id]||{};
    return {a, v:(d.prom!=null?d.prom:null), dif:(d.dif!=null?d.dif:null), sig:(d.sigdif!=null?d.sigdif:null)};});}

  // ===== Panel de evolucion de UNA metrica: linea eje FIJO 0-100 (sin autoescala,
  //       sin interpolar huecos) + marcas inter-anuales (dif absoluto + sigdif). =====
  function PanelEvolucion({nombre,color,pts}){
    const ref=useRef(null);
    useEffect(()=>{const el=ref.current;el.innerHTML="";
      const anios=pts.map(p=>String(p.a));
      const W=Math.max(220,anios.length*64),H=118,m={l:24,r:10,t:8,b:18};
      const svg=d3.select(el).append("svg").attr("width","100%").attr("viewBox","0 0 "+W+" "+H).attr("preserveAspectRatio","xMidYMid meet");
      const x=d3.scalePoint().domain(anios).range([m.l,W-m.r]).padding(.5);
      const y=d3.scaleLinear().domain([0,100]).range([H-m.b,m.t]);   // FIJO 0-100, nunca autoescala
      [0,50,100].forEach(t=>{svg.append("line").attr("x1",m.l).attr("x2",W-m.r).attr("y1",y(t)).attr("y2",y(t)).attr("stroke","var(--linea)");
        svg.append("text").attr("x",2).attr("y",y(t)+3).attr("class","axis-lab").text(t);});
      anios.forEach(a=>svg.append("text").attr("x",x(a)).attr("y",H-4).attr("text-anchor","middle").attr("class","axis-lab b").text(a+(PRELIM.has(a)?"*":"")));
      const dd=pts.map(p=>({a:String(p.a),v:p.v}));
      const line=d3.line().defined(d=>d.v!=null).x(d=>x(d.a)).y(d=>y(d.v));
      svg.append("path").datum(dd).attr("d",line).attr("fill","none").attr("stroke",color).attr("stroke-width",2.2);
      dd.forEach(p=>{if(p.v==null)return;svg.append("circle").attr("cx",x(p.a)).attr("cy",y(p.v)).attr("r",3.4).attr("fill",color)
        .on("mousemove",e=>showTT("<b>"+nombre+"</b><br>"+p.a+": "+fmt(p.v)+" (0–100)",e)).on("mouseleave",hideTT);});
    },[pts,color,nombre]);
    const marcas=pts.filter(p=>p.dif!=null);   // anios con cambio vs evaluacion anterior
    return (
      <div className="evol-panel">
        <div className="evol-h"><span className="evol-sw" style={{background:color}}></span>{nombre}</div>
        <div ref={ref}></div>
        <div className="evol-marks">
          {marcas.length===0
            ? <span className="evol-mark nt">sin cambios medibles entre años</span>
            : marcas.map(p=>{const cls=p.sig===1?"de":(p.sig===-1?"al":"nt");
                const g=p.sig===1?"▲":(p.sig===-1?"▼":"=");
                const txt=p.sig===0?"sin dif. significativa":"significativo";
                return <span className={"evol-mark "+cls} key={p.a}
                  title={p.a+": "+fmtSigned(p.dif)+" pts vs evaluación anterior · "+txt}>
                  <b>{p.a}</b> <span className="arr">{g}</span> {fmtSigned(p.dif)} <span className="evol-sig">{txt}</span></span>;})}
        </div>
      </div>);
  }

  // ===== Detalle de establecimiento con drill-down indicador->dimension->subdim =====
  function Detalle({rbd,grado,agno,onBack}){
    const [drillInd,setDrillInd]=useState(null);
    const [drillDim,setDrillDim]=useState(null);
    const [cmpA,setCmpA]=useState(null);              // II.6 — anio de comparacion en el radar (-1 = ninguno)
    useEffect(()=>{setDrillInd(null);setDrillDim(null);setCmpA(null);},[rbd,grado,agno]);
    const e=est[rbd]; const im=indOf(rbd,grado,agno),dm=dimOf(rbd,grado,agno),nm=nivOf(rbd,grado,agno);
    const ciclo=CICLO[grado]; const anios=DATA.meta.grado_anios[grado]||[]; const serie=anios.length>1;
    const axInd=DATA.indicadores.map(ind=>({label:ind.corto,value:im[ind.id]?im[ind.id].prom:null,color:ind.color}));

    // II.6 — comparacion de DOS anios del MISMO rbd/grado en el radar (solo nivel 0).
    // Default: anio actual vs el inmediatamente anterior CON serie; el usuario lo
    // cambia o lo apaga. Cada anio se LEE (prom por indicador); NA no se grafica.
    const aniosCD=anios.filter(a=>{const o=indOf(rbd,grado,a);return DATA.indicadores.some(ind=>o[ind.id]&&o[ind.id].prom!=null);});
    const cmpPrev=aniosCD.filter(a=>a<agno);
    const cmpDef=cmpPrev.length?Math.max.apply(null,cmpPrev):null;
    const cmpAgno = cmpA===-1 ? null
                  : (cmpA!=null && aniosCD.indexOf(cmpA)>=0 && cmpA!==agno) ? cmpA : cmpDef;
    const imB = cmpAgno!=null?indOf(rbd,grado,cmpAgno):{};
    const axIndB = DATA.indicadores.map(ind=>({label:ind.corto,value:imB[ind.id]?imB[ind.id].prom:null}));
    const cmpOpts = aniosCD.filter(a=>a!==agno);

    let nivel=0,tituloNivel="Indicadores",radarAxes=axInd,radarTitle="Mirada integral — 4 indicadores";
    let filas=DATA.indicadores.map(ind=>({id:ind.id,color:ind.color,nombre:ind.nombre,d:im[ind.id],
      definicion:ind.definicion,
      onClick:()=>{setDrillInd(ind.id);setDrillDim(null);}}));
    if(drillInd!=null){nivel=1;const ind=indById[drillInd];tituloNivel="Dimensiones de "+ind.nombre;
      const dims=dimsByInd[drillInd]||[];
      radarAxes=dims.map(d=>({label:String(d.id),value:dm[d.id]?dm[d.id].prom:null,color:ind.color}));
      radarTitle="Dimensiones del indicador";
      filas=dims.map(d=>({id:d.id,color:ind.color,nombre:d.nombre,d:dm[d.id],
        definicion:d.definicion,
        onClick:(subByDim[d.id]&&subByDim[d.id].length)?()=>setDrillDim(d.id):null}));}

    return (
      <div className="detail">
        <button className="back" onClick={onBack}>‹ Volver a la grilla</button>
        <h2>{e&&e.nom?tc(e.nom):rbd}</h2>
        <div className="dmeta">{e?comNom(e.cod_com):""} · {e?regNom(e.cod_reg):""} · {DEPE[e?.cod_depe2]||"—"} · GSE {gseLbl(rbd,grado,agno)} · {DATA.meta.grados[grado]} · {agno}{PRELIM.has(String(agno))?" (preliminar)":""}</div>
        <div className="help">La escala <b>0–100 es relativa</b>: por sí sola no dice si el establecimiento va bien o mal. Las anclas de lectura son el <b>desvío vs su GSE</b> (mismo grupo socioeconómico) y la <b>variación vs la evaluación anterior</b>, ambas con su significancia. <span style={{color:"var(--alerta)"}}>▼ rojo = significativamente bajo (alerta)</span>; <span style={{color:"var(--destaca)"}}>▲ verde = significativamente sobre (destacado)</span>.</div>

        <div className="dcrumb">
          <button onClick={()=>{setDrillInd(null);setDrillDim(null);}}>Indicadores</button>
          {drillInd!=null && <span> ▸ <b>{indById[drillInd].nombre}</b></span>}
          {drillDim!=null && <span> ▸ <b>{dimById[drillDim].nombre}</b></span>}
        </div>

        {drillInd!=null && drillDim==null &&
          <Definicion texto={indById[drillInd].definicion} etiqueta="Sobre este indicador" contexto={true}/>}

        {drillDim!=null
          ? <SubdimView rbd={rbd} grado={grado} agno={agno} dimId={drillDim} nm={nm} ciclo={ciclo}/>
          : (
          <div className="row2">
            <div className="blk">
              <h3>{radarTitle}</h3>
              <div style={{display:"flex",justifyContent:"center"}}><Radar axes={radarAxes}
                axesB={nivel===0&&cmpAgno!=null?axIndB:undefined} colB="#C77D3A"
                labelB={cmpAgno!=null?String(cmpAgno):null}
                size={nivel===0?280:250} showLabels={true} showValues={true}/></div>
              {nivel===0 && cmpOpts.length>0 &&
                <div className="radar-cmp">
                  <div className="leyenda">
                    <span><i style={{background:"var(--azul)"}}></i>{agno}{PRELIM.has(String(agno))?"*":""} · actual</span>
                    {cmpAgno!=null && <span><i style={{background:"#C77D3A"}}></i>{cmpAgno}{PRELIM.has(String(cmpAgno))?"*":""} · comparación</span>}
                  </div>
                  <label className="cmp-label">Comparar con:{" "}
                    <select value={cmpAgno!=null?cmpAgno:""} onChange={ev=>setCmpA(ev.target.value===""?-1:Number(ev.target.value))}>
                      {cmpOpts.map(a=><option key={a} value={a}>{a}{PRELIM.has(String(a))?"*":""}</option>)}
                      <option value="">— sin comparación</option>
                    </select>
                  </label>
                </div>}
              {nivel===1 && <div className="leyenda">{(dimsByInd[drillInd]||[]).map(d=>(<span key={d.id}>{d.id}. {d.nombre}</span>))}</div>}
            </div>
            <div className="blk">
              <h3>{tituloNivel} — lectura vs GSE y vs año anterior</h3>
              {filas.map(f=><AnchorRow key={f.id} color={f.color} nombre={f.nombre} d={f.d} definicion={f.definicion} onClick={f.onClick}/>)}
              <div className="nota">Cada cifra se interpreta por su <b>desvío</b>, no por su nivel absoluto. El motor lee <code>difgru</code>/<code>sigdifgru</code> (vs GSE) y <code>dif</code>/<code>sigdif</code> (vs evaluación anterior); no reconstruye el puntaje del GSE.</div>
            </div>
          </div>)}

        {drillDim==null &&
          <div className="blk" style={{marginTop:20}}>
            <h3>Evolución {nivel===1?"por dimensión":"por indicador"} <span style={{fontWeight:400,color:"var(--gris)"}}>· eje fijo 0–100, un panel por {nivel===1?"dimensión":"indicador"}</span></h3>
            {serie
              ? <div>
                  <div className="evol-grid">
                    {(nivel===1
                       ? (dimsByInd[drillInd]||[]).map(d=>({key:d.id,nombre:d.nombre,color:indById[drillInd].color,pts:serieFull(dimOf,rbd,grado,d.id,anios)}))
                       : DATA.indicadores.map(ind=>({key:ind.id,nombre:ind.nombre,color:ind.color,pts:serieFull(indOf,rbd,grado,ind.id,anios)}))
                     ).map(p=><PanelEvolucion key={p.key} nombre={p.nombre} color={p.color} pts={p.pts}/>)}
                  </div>
                  <div className="nota">Cada panel es una {nivel===1?"dimensión":"indicador"} con su propio eje fijo 0–100 (escala común, comparable). La marca de cada año muestra la diferencia absoluta (dif) vs la evaluación anterior y su significancia (▲/▼/= + texto), <b>leídas de la Agencia</b> (no calculadas). Años sin punto = sin aplicación (no se interpola). {anios.some(a=>PRELIM.has(String(a)))?"Los años con * son preliminares.":""}</div>
                </div>
              : <div className="nota">Sin serie suficiente para evolución: {DATA.meta.grados[grado]} tiene un solo año de aplicación ({anios.join(", ")}).</div>}
          </div>}
      </div>);
  }

  function gseLbl(rbd,grado,agno){const b=DATA.roster,r=RIX.roster[rbd];if(!r)return "—";
    for(let i=r[0];i<r[1];i++)if(b.grado[i]===grado&&b.agno[i]===agno){const g=b.gse[i];return g?(GSE[g]||g):"—";}return "—";}

  // ===== Vista de subdimensiones (distribucion de niveles, solo EST) =====
  function SubdimView({rbd,grado,agno,dimId,nm,ciclo}){
    const subs=subByDim[dimId]||[];
    return (
      <div className="blk">
        <h3>Distribución de niveles por subdimensión — {dimById[dimId].nombre}</h3>
        <Definicion texto={dimById[dimId].definicion} etiqueta="Sobre esta dimensión" contexto={true}/>
        <div className="leyenda"><span><i style={{background:"var(--bajo)"}}></i>Bajo</span><span><i style={{background:"var(--medio)"}}></i>Medio</span><span><i style={{background:"var(--alto)"}}></i>Alto</span><span>· solo respuestas de estudiantes (EST)</span></div>
        {subs.map(s=>{const v=nm[s.id]; const txt=(s.texto&&ciclo&&s.texto[ciclo])?s.texto[ciclo]:null;
          return (
            <div className="distrow" key={s.id}>
              <div className="lbl">{s.nombre} <span className="actores">[{s.actores}]</span></div>
              {s.definicion && <div className="defn">{s.definicion}</div>}
              {(!v||v.bajo==null)
                ? <div className="sup">sin dato (resguardo estadístico)</div>
                : <DistBar v={v}/>}
              {v&&v.bajo!=null&&txt&&<div className="nivel-txt"><b>Nivel Alto:</b> {txt.alto}</div>}
              {v&&v.bajo!=null&&!ciclo&&<div className="nivel-txt sup">Texto de nivel no disponible para este grado (8° básico).</div>}
            </div>);})}
      </div>);
  }

  // ===== EntityModal (selector portable; copia del andamio + a11y) =====
  // Replica de 50_documentacion/andamios/diseno/entity_modal/EntityModal.jsx
  // (andamio congelado). Se anade a11y en ESTA copia: role=dialog, aria-modal,
  // cierre con Escape. Modo simple (multiple=false): clic en fila => onSelect.
  function EntityModal({onSelect,onCancel,tabs,buildList,searchPlaceholderFor=null,emptyTextFor=null}){
    const tabInicial=tabs&&tabs.length?tabs[0][0]:"region";
    const [tab,setTab]=useState(tabInicial);
    const [q,setQ]=useState("");
    const ql=q.trim().toLowerCase();
    useEffect(()=>{const h=e=>{if(e.key==="Escape")onCancel();};
      window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[onCancel]);
    const list=buildList(tab,ql)||[];
    const placeholder=(searchPlaceholderFor&&searchPlaceholderFor(tab))||"Buscar…";
    const emptyText=(emptyTextFor&&emptyTextFor(tab,ql))||"Sin resultados";
    return (
      <div className="modal-backdrop" onClick={onCancel}>
        <div className="modal" role="dialog" aria-modal="true" aria-label="Seleccionar territorio o dependencia" onClick={e=>e.stopPropagation()}>
          <div className="modal-header"><h2 className="modal-title">Seleccionar territorio o dependencia</h2></div>
          <div className="modal-tabs">
            {tabs.map(([k,lbl])=>(
              <button key={k} className={"modal-tab"+(tab===k?" is-active":"")} onClick={()=>{setTab(k);setQ("");}}>{lbl}</button>))}
          </div>
          <div className="modal-body">
            <input className="input-search" placeholder={placeholder} value={q} onChange={e=>setQ(e.target.value)} autoFocus={true}
              style={{width:"100%",padding:"8px 10px",marginBottom:10,border:"1px solid var(--border-2)",borderRadius:"var(--radius-2)",fontFamily:"var(--font-body)",fontSize:"var(--fs-base)"}}/>
            <div className="comuna-checklist" style={{maxHeight:340}}>
              {list.length===0 && <div className="empty-state">{emptyText}</div>}
              {list.map(item=>(
                <div key={item.kind+"|"+item.cod} className="check-row" onClick={()=>onSelect(item)}>
                  <span className="check-name">{item.nom}</span>
                  <span className="check-region">{item.sub}</span>
                </div>))}
            </div>
          </div>
          <div className="modal-footer"><button className="estab-popup-btn" onClick={onCancel}>Cancelar</button></div>
        </div>
      </div>);
  }

  // Catalogos para buildList (del JSON ya embebido; sin cambios en 35.R).
  const COMUNAS_POR_REGION=(()=>{const m={};DATA.comunas.forEach(c=>{m[c.cod_reg]=(m[c.cod_reg]||0)+1;});return m;})();
  // Opciones de DEPENDENCIA: SOLO las 4 categorias de cod_depe2 con etiqueta
  // conocida en DEPE. Blindado (DEPE[e.cod_depe2]) para que la pestana jamas
  // liste comunas u otros valores ajenos a la dependencia (Hallazgo H5).
  const DEPS_OPTS=(()=>{const m={};DATA.establecimientos.forEach(e=>{if(e.cod_depe2!=null&&DEPE[e.cod_depe2])m[e.cod_depe2]=(m[e.cod_depe2]||0)+1;});
    return Object.keys(m).sort().map(c=>({cod:c,nom:DEPE[c],n:m[c]}));})();
  const TABS=[["region","Región"],["comuna","Comuna"],["dependencia","Dependencia"],["establecimiento","Establecimiento"]];
  function buildList(tab,ql){
    if(tab==="region") return DATA.regiones.filter(r=>!ql||r.nom.toLowerCase().includes(ql))
      .map(r=>({kind:"region",cod:r.cod,nom:r.nom,sub:(COMUNAS_POR_REGION[r.cod]||0)+" comunas"}));
    if(tab==="comuna") return DATA.comunas.filter(c=>!ql||c.nom.toLowerCase().includes(ql))
      .sort((a,b)=>a.nom.localeCompare(b.nom))
      .map(c=>({kind:"comuna",cod:c.cod,nom:tc(c.nom)+(FOCO.has(c.cod)?" ★":""),sub:regNom(c.cod_reg)}));
    if(tab==="dependencia") return DEPS_OPTS.filter(s=>!ql||s.nom.toLowerCase().includes(ql))
      .map(s=>({kind:"dependencia",cod:s.cod,nom:s.nom,sub:s.n+" establecimientos"}));
    return ql ? DATA.establecimientos.filter(e=>(e.nom&&e.nom.toLowerCase().includes(ql))||String(e.rbd).includes(ql)).slice(0,60)
      .map(e=>({kind:"establecimiento",cod:e.rbd,nom:tc(e.nom)||("RBD "+e.rbd),sub:comNom(e.cod_com)+" · RBD "+e.rbd})) : [];
  }
  const searchPlaceholderFor=tab=>tab==="establecimiento"?"Buscar por nombre o RBD…":"Buscar…";
  const emptyTextFor=(tab,ql)=>tab==="establecimiento"&&!ql?"Escribe para buscar un establecimiento":"Sin resultados";

  // ===== Navegacion territorial via EntityModal: region/comuna/dependencia/EE =====
  function App(){
    const grados=Object.keys(DATA.meta.grados);
    const [terr,setTerr]=useState(FOCO_INICIAL);   // apertura: foco SLEP Costa Central (estado, no filtro fijo)
    const [dep,setDep]=useState("");   // cod_depe2 (dependencia; combinable con el territorio)
    const [modalOpen,setModalOpen]=useState(false);
    const [grado,setGrado]=useState(grados.includes("4b")?"4b":grados[0]);
    const anios=DATA.meta.grado_anios[grado]||[];
    const [agno,setAgno]=useState(anios[anios.length-1]);
    const [gse,setGse]=useState("TODOS");
    const [rbdSel,setRbdSel]=useState(null);

    useEffect(()=>{const a=DATA.meta.grado_anios[grado]||[];if(!a.includes(agno))setAgno(a[a.length-1]);setRbdSel(null);},[grado]);
    useEffect(()=>{setRbdSel(null);},[terr,dep,agno,gse]);

    // EntityModal devuelve un item; se aplica segun su kind (acota, nunca agrega).
    const onPick=item=>{setModalOpen(false);
      if(item.kind==="region") setTerr({kind:"region",cod:item.cod});
      else if(item.kind==="comuna") setTerr({kind:"comuna",cod:item.cod});
      else if(item.kind==="dependencia") setDep(item.cod);
      else if(item.kind==="establecimiento") setRbdSel(item.cod);};

    // roster del territorio seleccionado, para (grado, agno). El territorio y la
    // dependencia solo ACOTAN la lista (continue); jamas agregan una cifra.
    const unidades=useMemo(()=>{const b=DATA.roster,out=[];
      for(let i=0;i<b.rows;i++){if(b.grado[i]!==grado||b.agno[i]!==agno)continue;
        const e=est[b.rbd[i]]; if(!e)continue;
        if(terr.kind==="foco"){ if(e.cod_slep!==SLEP_FOCO)continue; }
        else if(terr.kind==="comuna"){ if(e.cod_com!==terr.cod)continue; }
        else { if(e.cod_reg!==terr.cod)continue; }
        if(dep && e.cod_depe2!==dep)continue;
        if(gse!=="TODOS" && b.gse[i]!==gse)continue;
        out.push({rbd:b.rbd[i],gse:b.gse[i]});}
      return out;},[terr,dep,grado,agno,gse]);

    const grupos=useMemo(()=>{const g={};unidades.forEach(u=>{(g[u.gse||"sin"]=g[u.gse||"sin"]||[]).push(u);});
      return Object.keys(g).sort().map(k=>({gse:k,items:g[k].sort((a,b)=>(est[a.rbd]?.nom||"").localeCompare(est[b.rbd]?.nom||""))}));},[unidades]);

    const depNom = dep ? (DEPE[dep]||dep) : null;
    const terrTxt = terr.kind==="foco" ? "SLEP "+SLEP_FOCO_NOM
                  : terr.kind==="comuna" ? "comuna de "+comNom(terr.cod)
                  : "Región de "+regNom(terr.cod);
    const territorioTxt = terrTxt + (depNom?(" · dependencia: "+depNom):"");

    return (
      <div className="wrap">
        <div className="nav">
          <div className="nav-row">
            <div className="ctl"><label>Territorio / dependencia</label>
              <button className="nav-trigger" onClick={()=>setModalOpen(true)} aria-label="Abrir selector de territorio o dependencia">Explorar / cambiar selección ▾</button></div>
            <div className="ctl"><label>Grado</label>
              <div className="seg">{grados.map(g=><button key={g} className={g===grado?"on":""} onClick={()=>setGrado(g)}>{DATA.meta.grados[g]}</button>)}</div></div>
            <div className="ctl"><label>Año</label>
              <div className="seg">{anios.map(a=><button key={a} className={a===agno?"on":""} onClick={()=>setAgno(a)}>{a}{PRELIM.has(String(a))?"*":""}</button>)}</div></div>
            <div className="ctl"><label>Grupo socioeconómico</label>
              <div className="gse-pills">
                <button className={gse==="TODOS"?"on":""} onClick={()=>setGse("TODOS")}>Todos</button>
                {DATA.meta.gse.map(g=><button key={g} className={gse===g?"on":""} onClick={()=>setGse(g)}>{GSE[g]}</button>)}</div></div>
          </div>
          <div className="nav-sel">
            <span className="sel-chip"><span className="k">territorio</span> {terrTxt}</span>
            {dep && <span className="sel-chip"><span className="k">dependencia</span> {DEPE[dep]} <button onClick={()=>setDep("")} aria-label="Quitar filtro de dependencia">✕</button></span>}
            {SLEP_FOCO!=null && (terr.kind!=="foco"||dep) && <button className="sel-link" onClick={()=>{setTerr(FOCO_INICIAL);setDep("");}}>volver a {SLEP_FOCO_NOM}</button>}
          </div>
        </div>

        {modalOpen && <EntityModal tabs={TABS} buildList={buildList} searchPlaceholderFor={searchPlaceholderFor} emptyTextFor={emptyTextFor} onSelect={onPick} onCancel={()=>setModalOpen(false)}/>}

        {rbdSel
          ? <Detalle rbd={rbdSel} grado={grado} agno={agno} onBack={()=>setRbdSel(null)}/>
          : <div>
              <div className="crumb">Mostrando establecimientos educacionales de <b>{territorioTxt}</b> · {DATA.meta.grados[grado]} · {agno}{PRELIM.has(String(agno))?" (preliminar)":""} · {unidades.length} establecimientos</div>
              <div className="help">Cada tarjeta es un <b>establecimiento individual</b> (su dato crudo, nunca un promedio). El color de alerta resume cuántos indicadores están <span style={{color:"var(--alerta)"}}>significativamente bajo su GSE (▼)</span> o <span style={{color:"var(--destaca)"}}>sobre él (▲)</span>. El territorio solo acota la lista; no produce cifras agregadas. Haz clic en un establecimiento para ver el detalle y bajar a dimensiones y subdimensiones.</div>
              <div className="leyenda">{DATA.indicadores.map(i=>(<span key={i.id}><i style={{background:i.color}}></i>{i.nombre}</span>))}<span>· ★ Costa Central</span></div>
              {unidades.length===0
                ? <div className="empty">No hay establecimientos educacionales con datos para esta combinación de territorio, grado, año y GSE.</div>
                : grupos.map(grp=>(
                    <div className="gse-group" key={grp.gse}>
                      <div className="gse-head"><span className="tag">GSE · {GSE[grp.gse]||"sin clasificar"}</span><span className="cnt">{grp.items.length} establecimientos educacionales</span></div>
                      <div className="grid">{grp.items.map(u=><Card key={u.rbd} rbd={u.rbd} grado={grado} agno={agno} onSel={setRbdSel}/>)}</div>
                    </div>))}
            </div>}
      </div>);
  }
  const tRender0=performance.now();
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  window.__tRender = performance.now()-tRender0;
  </script>
</body>
</html>
